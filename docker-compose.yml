version: "3.8"

services:

  backend:
    build: ./backend  #  Build image using Dockerfile from specified path, Use Dockerfile in current directory  # Dockerfile in backend folder
    ports:
      - "5000:5000"  # host:container, Maps a port from your computer (host) to container
    volumes:
      - ./backend:/app # This is a BIND MOUNT (links to your computer folder) -> It mirrors your real-life folder.
      - /app/node_modules  # This is an ANONYMOUS/Named VOLUME (managed by Docker) -> Docker handles the storage.
      - shared_uploads:/app/uploads  # ← SHARED VOLUME (uploads)
      - shared_logs:/app/logs  # ← SHARED VOLUME
      - shared_config:/app/config  # ← SHARED VOLUME
    environment:
      - MONGO_URL=mongodb://mongo:27017/mern_db # Sets environment variables inside container
    depends_on: # Wait for mongodb to start
      - mongo

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - shared_logs:/app/logs  # ← SAME SHARED VOLUME
    depends_on:
      - backend

  mongo:
    image: mongo  # Use pre-built image, Use existing image from Docker Hub
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
    # Creates admin user automatically
    - MONGO_INITDB_ROOT_USERNAME=admin
    - MONGO_INITDB_ROOT_PASSWORD=secret

  mongo-express:
    image: mongo-express:latest    # from Docker Hub!
    ports:
      - "8081:8081"                # Access UI at localhost:8081
    volumes:
      - shared_uploads:/data/uploads  # ← SAME SHARED VOLUME
      - shared_config:/data/config  # ← SAME SHARED VOLUME
    environment:
      # MongoDB connection credentials
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=secret
      - ME_CONFIG_MONGODB_SERVER=mongo    # Connects to 'mongo' service
      # HTTP login credentials
      - ME_CONFIG_BASICAUTH_USERNAME=admin # local port mongodb username
      - ME_CONFIG_BASICAUTH_PASSWORD=secret # local port mongodb password
    depends_on:
      - mongo
  
  redis:
    image: redis:7.2-alpine  # Lightweight Redis image
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data  # Persist Redis data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-secret}
    environment:
      - REDIS_PASSWORD=secret
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "secret", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  mongo_data: # Without volumes, database data disappears when container stops!
  shared_uploads:  # ← SHARED VOLUME (backend + mongo-express use this)
  shared_logs:  # ← SHARED VOLUME for logs
  shared_config:  # ← SHARED VOLUME for configs
  redis_data:  # ← New volume for Redis persistence


# backend:
#   env_file:
#     - .env              # Load variables from .env file,  Load environment variables from a file (keeps secrets secure)

# backend:
#   restart: always        # Auto-restart if crashes, What happens if container stops/crashes
#   restart: "no"        # Never restart
#   restart: always      # Always restart (even if manually stopped)
#   restart: on-failure  # Only restart if crashed (not if stopped normally)
#   restart: unless-stopped # Restart always unless manually stopped

# backend:
#     command: npm run dev    # Override default CMD from Dockerfile, Override the default command that runs when container starts

# backend:
#     container_name: my-backend-api    # Custom name vs auto-generated, Give container a specific name (instead of random like backend_1_kjshf)

# Volume Types:
# Bind mount: ./backend:/app - Links to a folder on YOUR computer
# Named volume: mongo_data:/data/db - Stored by Docker (you named it mongo_data)
# Anonymous volume: /app/node_modules - Stored by Docker (no name, auto-generated)

